name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          # stdlib-only project: no go.sum exists, so there is nothing to cache
          cache: false

      - name: Install analysis tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/kisielk/errcheck@latest
          go install github.com/mgechev/revive@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: gofmt
        run: test -z "$(gofmt -l .)"

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: staticcheck ./...

      - name: errcheck
        run: errcheck ./...

      - name: revive
        run: revive -config revive.toml ./...

      - name: gosec
        run: gosec ./...

      - name: govulncheck
        run: govulncheck ./...

      - name: tests
        run: |
          go test ./... -race -vet=all -shuffle=on -count=1 -timeout=120s -coverprofile=coverage.out
          go tool cover -func=coverage.out

      # The tool gates its own repository: exit 2 on any security finding.
      - name: self-audit
        run: go run ./cmd/goaudit --path .
